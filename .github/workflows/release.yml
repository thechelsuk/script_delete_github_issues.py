name: Release Version

on:
    push:
        branches:
            - main
        paths:
            - "package.json"

jobs:
    release:
        name: Create Tag & Release
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  fetch-depth: 2 # Need at least 2 commits to detect version change

            - name: Get version from package.json
              id: pkg
              run: |
                  VERSION=$(jq -r '.version' package.json)
                  DESCRIPTION=$(jq -r '.description // empty' package.json)
                  echo "version=${VERSION}" >> $GITHUB_OUTPUT
                  echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
                  echo "description<<EOF" >> $GITHUB_OUTPUT
                  echo "$DESCRIPTION" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Check if version changed
              id: version_changed
              run: |
                  PREV_JSON=$(git show HEAD~1:package.json 2>/dev/null || echo "{}")
                  PREV_VERSION=$(echo "$PREV_JSON" | jq -r '.version // empty' 2>/dev/null || echo "")
                  CURR_VERSION=${{ steps.pkg.outputs.version }}
                  if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                  fi

            - name: Check tag does not already exist
              id: tag_check
              if: steps.version_changed.outputs.changed == 'true'
              run: |
                  TAG=${{ steps.pkg.outputs.tag }}
                  if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Get last commit message
              id: commit
              if: |
                  steps.version_changed.outputs.changed == 'true' &&
                  steps.tag_check.outputs.exists == 'false'
              run: |
                  MSG=$(git log -1 --pretty=%B)
                  # Escape multiline for GitHub output
                  echo "message<<EOF" >> $GITHUB_OUTPUT
                  echo "$MSG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Create tag
              if: |
                  steps.version_changed.outputs.changed == 'true' &&
                  steps.tag_check.outputs.exists == 'false'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag ${{ steps.pkg.outputs.tag }}
                  git push origin ${{ steps.pkg.outputs.tag }}

            - name: Create GitHub Release
              if: |
                  steps.version_changed.outputs.changed == 'true' &&
                  steps.tag_check.outputs.exists == 'false'
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ steps.pkg.outputs.tag }}
                  name: ${{ steps.pkg.outputs.version }}
                  body: |
                      ## About

                      ${{ steps.pkg.outputs.description }}

                      ## Recent Changes

                      ${{ steps.commit.outputs.message }}
                  draft: false
                  prerelease: ${{ contains(steps.pkg.outputs.version, '-') }}
